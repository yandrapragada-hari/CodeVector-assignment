services:
  - type: web
    name: codevector-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # set to your Vercel URL after deploy
